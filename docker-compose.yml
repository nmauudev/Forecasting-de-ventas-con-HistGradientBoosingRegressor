version: "3.9"

# ============================================================
# Docker Compose - Simulador de Ventas
# ============================================================
# Para levantar: docker-compose up --build
# Para detener:  docker-compose down

services:
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simulador_ventas
    image: simulador-ventas:latest
    ports:
      # Puerto local:puerto contenedor
      - "8501:8501"
    volumes:
      # Montar los datos para poder actualizarlos sin reconstruir la imagen
      - ./data/processed:/app/data/processed:ro
      # Montar el modelo para actualizarlo sin reconstruir
      - ./models:/app/models:ro
    environment:
      # Variables de entorno de configuración de Streamlit
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ============================================================
# Uso:
#   Producción:    docker-compose up -d
#   Desarrollo:    docker-compose up
#   Rebuild:       docker-compose up --build
#   Ver logs:      docker-compose logs -f streamlit-app
#   Detener:       docker-compose down
# ============================================================
