[pytest]
# ============================================================
# Configuración de Pytest - Feature Store Tests
# ============================================================

# Directorio donde encontrar los tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones por defecto al correr pytest
addopts =
    --verbose
    --tb=short
    --strict-markers

# Markers personalizados
markers =
    feature_store: Tests del Feature Store (predicciones recursivas y lags)
    validaciones: Tests de validación de features y fórmulas
    slow: Tests que tardan más de 1 segundo

# Mostrar duración de los tests más lentos
# Requiere: pytest --durations=10
